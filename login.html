<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用户授权登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: rgba(0, 0, 0, 0) !important;
    -webkit-tap-highlight-color: transparent !important;}
    *:focus {
    outline: none !important;
}

/* 🌟 3. 针对 iOS 特有的点击阴影 */
input, textarea, button, a {
    -webkit-appearance: none;
}
        
        body, html { 
            width: 100%; 
            height: 100%; 
            background-image: url('./login.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            overflow: hidden; 
        }

        .login-container {
            width: 100%; max-width: 704px; height: 100dvh;
            margin: 0 auto; position: relative;
        }

        /* 顶部 Logo 区域 */
        .header-logo {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%;
        }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 15px; }
        .brand-name { color: #ffffff; font-size: 22px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        /* 按钮操作区：居中靠下 */
        .bottom-action-area {
            position: absolute; top: 50%; left: 50%; transform: translateX(-50%);
            width: 85%; display: flex; flex-direction: column; align-items: center;
        }

        .btn {
            width: 100%; height: 54px; border-radius: 30px; font-size: 17px;
            font-weight: bold; border: none; cursor: pointer; display: flex;
            align-items: center; justify-content: center; margin-bottom: 15px; transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }

        .btn-blue { background-color: #007bff; color: white; box-shadow: 0 6px 20px rgba(0,123,255,0.3); }
        .btn-gray { background-color: #f2f3f5; color: #666666; margin-bottom: 25px; }

        /* 协议勾选 */
        .agreement-row { display: flex; align-items: center; font-size: 13px; color: rgba(9, 9, 9, 0.8); }
        .checkbox-wrapper {
            width: 20px; height: 20px; margin-right: 8px;
            background: #ffffff; border: 1px solid #cccccc;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-sizing: border-box; transition: 0.2s;
        }
        .checkbox-wrapper.checked { border: 1px solid #007bff; background: #ffffff; }
        .checkbox-svg { display: none; width: 22px; height: 22px; }
        .checkbox-wrapper.checked .checkbox-svg { display: block; }
        .agreement-text a { color: #007bff; text-decoration: none; font-weight: bold; }

        /* ================= 🌟 1. 基础提示弹窗 ================= */
        #error-popup {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }
        .error-box {
            background: white; width: 80%; max-width: 400px; border-radius: 16px; padding: 30px 20px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .error-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 12px; }
        #popup-message { color: #666; font-size: 15px; line-height: 1.5; }
        .error-btn {
            background: #007bff; color: white; padding: 12px 0; width: 100%;
            border-radius: 25px; font-size: 16px; margin-top: 25px; font-weight: bold; cursor: pointer;
        }

        /* 抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(-50%); }
            20%, 60% { transform: translateX(-54%); }
            40%, 80% { transform: translateX(-46%); }
        }
        .shake-active { animation: shake 0.4s ease-in-out; }

        /* ================= 🌟 2. 底部滑出授权弹窗 (60% 高度) ================= */
        #slide-auth-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10000;
            display: none; flex-direction: column; justify-content: flex-end; /* 靠底对齐 */
        }
        .slide-modal-content {
            width: 100%; height: 60%; background-color: #f2f3f5; /* 整体灰色背景 */
            border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column;
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        /* 授权面板内容排版 */
        .sm-header { display: flex; align-items: center; padding: 20px 20px 10px 20px; }
        .sm-logo { width: 28px; height: 28px; border-radius: 50%; margin-right: 10px; object-fit: cover; }
        .sm-brand { font-size: 16px; font-weight: bold; color: #333; }
        
        .sm-body { padding: 0 20px; flex: 1; display: flex; flex-direction: column; }
        .sm-title { font-size: 20px; font-weight: 900; color: #333; margin-bottom: 8px; }
        .sm-desc { font-size: 14px; color: #999999; margin-bottom: 35px; } /* 小白灰色字体 */
        
        /* 白色长方形按钮 */
        .sm-btn {
            background-color: #ffffff; border-radius: 8px; padding: 16px;
            text-align: center; font-size: 16px; font-weight: bold;
            margin-bottom: 12px; cursor: pointer; transition: background 0.2s;
        }
        .sm-btn:active { background-color: #eaeaea; }
        .sm-btn-primary { color: #007bff; } /* 使用手机号 - 蓝色字 */
        .sm-btn-reject { color: #333333; }  /* 不允许 - 深色字 */
        
        .sm-footer { padding: 20px; text-align: center; }
        .sm-add-link { color: #007bff; font-size: 14px; cursor: pointer; }

        /* ================= 🌟 3. 通用复用输入框弹窗 (加手机/改昵称) ================= */
        #input-popup {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 11000;
            display: none; align-items: center; justify-content: center;
        }
        .input-box {
            background: white; width: 80%; max-width: 320px; border-radius: 12px; padding: 25px 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .input-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .input-field {
            width: 100%; padding: 12px 15px; border: 1px solid #ccc;
            border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 25px;
            background: #f8f9fa; text-align: center;
        }
        .input-field:focus { border-color: #007bff; }
        .input-actions { display: flex; width: 100%; gap: 10px; }
        .i-btn {
            flex: 1; padding: 12px 0; border-radius: 20px; text-align: center;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .i-btn-cancel { background: #f2f3f5; color: #666; }
        .i-btn-confirm { background: #007bff; color: white; }
    </style>
</head>
<body>
<!--
    
<div class="login-container">
    <div class="header-logo">
        <img src="./logo.png" class="logo-img" alt="logo">
        <p class="brand-name">汾酒防伪查验系统</p>
    </div>-->

    <div class="bottom-action-area" id="action-box">
        <button class="btn btn-blue" onclick="handleLoginClick()">授权登录</button>
        <button class="btn btn-gray" onclick="handleCancel()">暂不授权</button>

        <div class="agreement-row">
            <div class="checkbox-wrapper" id="custom-checkbox" onclick="toggleCheckbox()">
                <svg class="checkbox-svg" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1024 518.330182C1024 794.763636 794.763636 1024 505.669818 1024 229.236364 1024 0 794.763636 0 518.330182 0 229.213091 229.236364 0 505.669818 0 794.786909 0 1024 229.236364 1024 518.330182z m-771.258182 15.685818l144.360727 148.573091a23.086545 23.086545 0 0 0 32.93091 0.558545l341.876363-334.661818a22.807273 22.807273 0 0 0-0.093091-32.628363l3.490909 3.42109a26.600727 26.600727 0 0 0-34.746181-1.396363l-309.061819 256.069818c-10.193455 8.471273-26.414545 8.610909-36.701091 0.768l-109.847272-83.735273a22.970182 22.970182 0 0 0-32.535273 4.584728l-2.094545 2.839272c-7.703273 10.426182-6.586182 26.321455 2.443636 35.607273z" fill="#007bff"></path>
                </svg>
            </div>
            <span>我已阅读并同意 <a href="#">《用户服务协议》</a> <a href="#">《隐私协议》</a></span>
        </div>
    </div>
</div>

<div id="error-popup">
    <div class="error-box">
        <div class="error-title">提示</div>
        <div id="popup-message"></div>
        <div class="error-btn" onclick="closeErrorPopup()">确定</div>
    </div>
</div>

<div id="slide-auth-modal">
    <div class="slide-modal-content">
        <div class="sm-header">
            <img src="./logo.png" class="sm-logo" alt="logo">
            <span class="sm-brand">汾酒防伪</span>
        </div>
        <div class="sm-body">
            <div class="sm-title">申请获取并验证你的手机号</div>
            <div class="sm-desc">出现产品质量时，及时反馈到本人</div>
            
            <div class="sm-btn sm-btn-primary" id="primary-phone-btn" onclick="executeFinalLogin()">使用本机手机号</div>
            <div class="sm-btn sm-btn-reject" onclick="closeSlideModal()">不允许</div>
        </div>
        <div class="sm-footer">
            <span class="sm-add-link" onclick="openDynamicInput('phone')">添加其他号码</span>
        </div>
    </div>
</div>

<div id="input-popup">
    <div class="input-box">
        <div class="input-title" id="dynamic-input-title">标题</div>
        <input type="text" id="dynamic-input-field" class="input-field" placeholder="请输入">
        <div class="input-actions">
            <div class="i-btn i-btn-cancel" onclick="closeDynamicInput()">取消</div>
            <div class="i-btn i-btn-confirm" onclick="confirmDynamicInput()">确定</div>
        </div>
    </div>
</div>

<script>
    let isChecked = false;
    let finalPhoneNumber = "1**********"; // 模拟本机号码
    let currentInputMode = ''; // 记录当前输入框的作用是什么（phone 或 nickname）

    function toggleCheckbox() {
        isChecked = !isChecked;
        document.getElementById('custom-checkbox').classList.toggle('checked', isChecked);
    }

    // ====== 基础提示弹窗 ======
    function showCustomPopup(message) {
        document.getElementById('popup-message').innerText = message;
        document.getElementById('error-popup').style.display = 'flex'; 
    }
    function closeErrorPopup() {
        document.getElementById('error-popup').style.display = 'none';
    }

    // ====== 点击【授权登录】主按钮 ======
    function handleLoginClick() {
        if (!isChecked) {
            showCustomPopup("请先阅读并勾选页面下方的协议");
            const box = document.getElementById('action-box');
            if (box) { box.classList.remove('shake-active'); void box.offsetWidth; box.classList.add('shake-active'); }
            return;
        }
        // 勾选了，唤起底部 60% 滑动面板
        document.getElementById('slide-auth-modal').style.display = 'flex';
    }

    // 关闭底部面板
    function closeSlideModal() {
        document.getElementById('slide-auth-modal').style.display = 'none';
    }

    // ====== 🌟 通用输入框逻辑（完美兼容未来 CC3 改昵称） ======
    function openDynamicInput(mode) {
        currentInputMode = mode;
        const titleEl = document.getElementById('dynamic-input-title');
        const inputEl = document.getElementById('dynamic-input-field');
        
        if (mode === 'phone') {
            titleEl.innerText = "添加手机号码";
            inputEl.type = "tel";
            inputEl.placeholder = "请输入11位真实手机号";
            inputEl.maxLength = 11;
        } else if (mode === 'nickname') {
            titleEl.innerText = "修改昵称";
            inputEl.type = "text";
            inputEl.placeholder = "请输入新昵称";
            inputEl.maxLength = 15;
        }
        
        inputEl.value = ''; // 清空上次输入
        document.getElementById('input-popup').style.display = 'flex';
    }

    function closeDynamicInput() {
        document.getElementById('input-popup').style.display = 'none';
    }

    // 点击输入弹窗的【确定】
    function confirmDynamicInput() {
        const val = document.getElementById('dynamic-input-field').value.trim();
        
        if (currentInputMode === 'phone') {
            // 验证 11 位数字
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!phoneRegex.test(val)) {
                showCustomPopup("手机号格式不正确，请重新输入");
                return;
            }
            // 🌟 验证通过：去除中间四位改为****
            const maskedPhone = val.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
            finalPhoneNumber = val; // 保存真实号码（后台用）
            
            // 替换面板上的按钮文字
            document.getElementById('primary-phone-btn').innerText = maskedPhone;
            
            closeDynamicInput();
            
        } else if (currentInputMode === 'nickname') {
            if (!val) { showCustomPopup("昵称不能为空"); return; }
            // CC3 修改昵称的逻辑可以写在这里
            localStorage.setItem('user_nickname', val);
            closeDynamicInput();
            showCustomPopup("昵称修改成功！");
        }
    }

    // ====== 最终执行登录跳转 ======
    function executeFinalLogin() {
        // 记录授权状态和手机号（正式版这里可以发给后端）
        localStorage.setItem('user_authorized', 'true');
        localStorage.setItem('user_phone', finalPhoneNumber);
        
        // 携带原有参数回到主页
        const search = window.location.search;
        window.location.href = './index.html' + search;
    }

    // 点击【暂不授权】
    function handleCancel() {
        const search = window.location.search;
        const newSearch = search ? search + '&guest=1' : '?guest=1';
        window.location.href = './index.html' + newSearch;
    }
</script>
</body>
</html>
