<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web NFC UID 读取与比对</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            padding: 15px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:active {
            background-color: #0056b3;
        }
        /* 进度控制台样式 */
        .console-wrapper {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            height: 300px;
            overflow-y: auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .console-wrapper p {
            margin: 5px 0;
            word-wrap: break-word;
        }
        .log-error { color: #ff5555; }
        .log-success { color: #55ff55; }
        .log-info { color: #aaaaaa; }
    </style>
</head>
<body>

    <div class="container">
        <h2>NFC UID 验证系统</h2>
        <p>请点击下方按钮，并将 NFC 标签靠近手机背面。</p>
        <button id="scanBtn">开始扫描 NFC</button>
    </div>

    <!-- 侧边/底部 进度控制台 -->
    <div class="console-wrapper" id="consoleOutput">
        <p class="log-info">>> 控制台已初始化，等待操作...</p>
    </div>

    <script>
        // 模拟的数据库：允许通过的 UID 列表 (格式通常为冒号分隔的十六进制，例如 "04:A1:B2:C3:D4:E5:F6")
        const authorizedUIDs = [
            "04:5A:6B:7C:8D:9E:0F", 
            "12:34:56:78",
            // 在实际测试中，你可以先读取一次你的标签 UID，然后把它填到这里
        ];

        const scanBtn = document.getElementById('scanBtn');
        const consoleOutput = document.getElementById('consoleOutput');

        // 自定义控制台输出函数
        function logToConsole(message, type = 'info') {
            const p = document.createElement('p');
            p.textContent = `>> ${message}`;
            
            if (type === 'error') p.className = 'log-error';
            else if (type === 'success') p.className = 'log-success';
            else p.className = 'log-info';

            consoleOutput.appendChild(p);
            // 自动滚动到最底部
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        scanBtn.addEventListener('click', async () => {
            logToConsole('检查设备是否支持 Web NFC...');

            if (!("NDEFReader" in window)) {
                logToConsole('此浏览器不支持 Web NFC。请确保使用 Android 上的 Chrome 浏览器，并通过 HTTPS 访问。', 'error');
                return;
            }

            try {
                const ndef = new NDEFReader();
                logToConsole('请求 NFC 权限并启动扫描...');
                
                await ndef.scan();
                logToConsole('扫描已启动！请将 NFC 标签靠近手机背面。', 'success');

                // 监听读取错误
                ndef.onreadingerror = (event) => {
                    logToConsole('读取失败：无法解析该标签，或者靠近时间太短。', 'error');
                };

                // 监听成功读取事件
                ndef.onreading = (event) => {
                    const uid = event.serialNumber; // 获取标签的 UID
                    
                    if (!uid) {
                        logToConsole('读取成功，但该标签没有暴露 UID。', 'error');
                        return;
                    }

                    logToConsole(`检测到标签！获取 UID: [${uid}]`);

                    // 核心逻辑：比对 UID
                    logToConsole('正在与数据库进行比对...');
                    if (authorizedUIDs.includes(uid)) {
                        logToConsole(`验证通过！UID ${uid} 是授权设备。`, 'success');
                        // 这里可以触发后续的业务逻辑，比如开门、打卡等
                    } else {
                        logToConsole(`验证拒绝！未知的 UID：${uid}`, 'error');
                    }
                };

            } catch (error) {
                logToConsole(`发生错误: ${error.message}`, 'error');
                if (error.name === 'NotAllowedError') {
                    logToConsole('用户拒绝了 NFC 权限。', 'error');
                }
            }
        });
    </script>
</body>
</html>
